<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validator — Input Rules & Error Handling</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300,400,600&family=Inter:wght@400;600;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="form-validator.css" />
  </head>

  <body>
    <!-- PROJECT HEADER -->
    <header class="projectHeader">
      <div class="shell">
        <div class="projectNav">
          <a
            class="btnNav"
            href="../../../case-studies/custom-appointment-booking-system.html"
          >
            ← Back to Case Study
          </a>
        </div>

        <h1 class="display">Form Validator</h1>
        <p class="lead">
          A validation flow focused on clear constraints, inline feedback, and
          preventing submission errors.
        </p>
      </div>
    </header>

    <!-- DEMO -->
    <main class="demo demo-validator">
      <div class="shell demoHeader">
        <h2 class="demoTitle">Form Validation Demo</h2>
        <p class="demoSub">
          Shows validation states and feedback clearly as users interact.
        </p>
      </div>

      <div class="formCard">
        <form id="registration-form" novalidate>
          <div class="form-group">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Enter username" />
            <small></small>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Enter email" />
            <small></small>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter password" />
            <small></small>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input
              id="confirmPassword"
              type="password"
              placeholder="Confirm password"
            />
            <small></small>
          </div>

          <button type="submit">Register</button>
        </form>
      </div>
    </main>

    <!-- Script -->
    <script src="form-validator.js"></script>
  </body>
</html>
