<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validator — Input Rules &amp; Error Handling</title>

    <!-- Header UI (shared, safe) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300,400,600&family=Inter:wght@400;600;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --text: #2e2e2e;
        --muted: rgba(46, 46, 46, 0.72);
        --border: rgba(0, 0, 0, 0.12);
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.12);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        color: var(--text);
      }
      .shell {
        max-width: 1120px;
        margin: 0 auto;
        padding: 0 20px;
      }
      .projectHeader {
        padding: 38px 0 18px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      }
      .projectNav {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 14px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 999px;
        font-weight: 900;
        text-decoration: none;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.78);
        color: var(--text);
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease;
      }
      .btn:hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow);
      }
      .display {
        margin: 0 0 10px;
        font-family: Fraunces, serif;
        font-weight: 400;
        letter-spacing: -0.02em;
        line-height: 1.08;
        font-size: clamp(1.9rem, 3.2vw, 2.6rem);
      }
      .lead {
        margin: 0;
        color: var(--muted);
        max-width: 72ch;
      }
      .demo {
        padding: 26px 0 70px;
      }
      .demoHeader {
        margin: 0 auto 18px;
      }
      .demoTitle {
        margin: 0 0 6px;
        font-size: 1.15rem;
        font-weight: 950;
      }
    </style>

    <link rel="stylesheet" href="form-validator.css" />
  </head>

  <body>
    <header class="projectHeader">
      <div class="shell">
        <div class="projectNav">
          <a
            class="btn"
            href="../../../case-studies/custom-appointment-booking-system.html"
          >
            ← Back to Case Study
          </a>
        </div>

        <h1 class="display">
          Form Validator — Input Rules &amp; Error Handling
        </h1>
        <p class="lead">
          A validation flow focused on clear constraints, inline feedback, and
          preventing submission errors.
        </p>
      </div>
    </header>

    <main class="demo demo-validator">
      <div class="shell demoHeader">
        <h2 class="demoTitle">Form Validation Demo</h2>
        <p class="lead">
          Shows validation states and feedback clearly as users interact.
        </p>
      </div>

      <div class="shell">
        <div class="form-container">
          <form id="registrationForm" novalidate>
            <div class="form-group">
              <label for="username">Username</label>
              <input type="text" id="username" placeholder="Enter username" />
              <small></small>
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="Enter email" />
              <small></small>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                placeholder="Enter password"
              />
              <small></small>
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm Password"
              />
              <small></small>
            </div>

            <button type="submit">Register</button>
          </form>
        </div>
      </div>
    </main>

    <script src="form-validator.js"></script>
  </body>
</html>
