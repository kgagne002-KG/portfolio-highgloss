<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Search — Filtering & State Handling</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300,400,600&family=Inter:wght@400;600;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="recipe-search.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <header class="projectHeader">
      <div class="shell">
        <a
          class="btnNav"
          href="../../../case-studies/custom-appointment-booking-system.html"
        >
          ← Back to Case Study
        </a>

        <h1 class="display">Recipe Search</h1>
        <p class="lead">
          A search interface demonstrating controlled filtering, predictable
          state transitions, and clear empty and error handling.
        </p>
      </div>
    </header>

    <main class="demo demo-recipe">
      <section class="demoHeader shell">
        <h2 class="demoTitle">
          <i class="fas fa-utensils"></i> Recipe Search Demo
        </h2>
        <p class="demoSub">
          Find recipes and explore results as search input changes.
        </p>
        <p class="apiLink">
          Data source:
          <a href="https://www.themealdb.com/api.php" target="_blank">
            TheMealDB
          </a>
        </p>
      </section>

      <section class="searchSection shell">
        <input
          type="text"
          id="search-input"
          placeholder="Search meals or ingredients"
        />
        <button id="search-btn">Search</button>
      </section>

      <div id="error-container" class="stateMessage hidden shell"></div>
      <div id="result-heading" class="shell resultHeading"></div>

      <section id="meals" class="mealsGrid shell"></section>

      <section id="meal-details" class="mealDetails hidden shell">
        <button id="back-btn" class="linkBtn">
          <i class="fas fa-arrow-left"></i> Back to results
        </button>
        <div class="meal-details-content"></div>
      </section>
    </main>

    <script src="recipe-search.js"></script>
  </body>
</html>
