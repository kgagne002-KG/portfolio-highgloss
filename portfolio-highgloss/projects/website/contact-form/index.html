<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get in Touch</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300,400,600&family=Inter:wght@400;600;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="contact-form.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <header class="projectHeader">
      <div class="shell">
        <div class="projectNav">
          <a
            class="btnNav"
            href="../../../case-studies/service-based-business-website.html"
          >
            ← Back to Case Study
          </a>
        </div>

        <h1 class="display">Get in Touch</h1>
        <p class="lead">
          Share a few details about your project. If you selected a pricing
          option, it’s already noted below to keep things focused.
        </p>
      </div>
    </header>

    <main class="demo">
      <section id="contact" class="form-container">
        <form
          name="contact"
          method="POST"
          data-netlify="true"
          netlify-honeypot="bot-field"
        >
          <input type="hidden" name="form-name" value="contact" />
          <p class="hidden">
            <label> Don’t fill this out: <input name="bot-field" /> </label>
          </p>

          <!-- Selected package -->
          <div class="input-field">
            <label for="package">Selected Pricing Option</label>
            <input
              type="text"
              id="package"
              name="package"
              readonly
              aria-readonly="true"
              placeholder="Not selected yet"
            />
            <p class="form-note clickable" onclick="clearPackage()">
              Change selection
            </p>
          </div>

          <!-- Contact info -->
          <div class="input-group">
            <div class="input-field">
              <i class="fas fa-user" aria-hidden="true"></i>
              <input
                id="name"
                type="text"
                name="name"
                placeholder="Name"
                required
              />
            </div>

            <div class="input-field">
              <i class="fas fa-envelope" aria-hidden="true"></i>
              <input
                id="email"
                type="email"
                name="email"
                placeholder="Email"
                required
              />
            </div>

            <div class="input-field">
              <i class="fas fa-phone" aria-hidden="true"></i>
              <input type="tel" name="phone" placeholder="Phone (optional)" />
            </div>

            <div class="input-field">
              <i class="fas fa-tag" aria-hidden="true"></i>
              <input
                type="text"
                name="subject"
                placeholder="Project subject"
                required
              />
            </div>
          </div>

          <!-- Message -->
          <div class="message-field">
            <p class="form-note">
              A little context helps me provide an accurate quote and timeline.
            </p>
            <textarea
              name="message"
              placeholder="Tell me about your goals, timeline, or questions"
              required
            ></textarea>
          </div>

          <button type="submit">
            Send Message <i class="fas fa-paper-plane" aria-hidden="true"></i>
          </button>

          <p class="form-note subtle">
            I usually respond within one business day.
          </p>
        </form>
      </section>
    </main>

    <script>
      (function () {
        const field = document.getElementById("package");
        if (!field) return;

        const pkg = sessionStorage.getItem("selectedPackage");
        if (pkg) {
          field.value = pkg;
        }
      })();
    </script>
  </body>
</html>
