<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanks — Message Sent</title>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, sans-serif;
        background: linear-gradient(135deg, #f7f4ef, #ffffff);
        color: #2e2e2e;
      }

      .card {
        max-width: 520px;
        padding: 36px;
        border-radius: 28px;
        background: #ffffff;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.12);
        text-align: center;
      }

      h1 {
        font-family: Fraunces, serif;
        margin: 0 0 12px;
        font-size: 2.2rem;
      }

      p {
        font-size: 1.05rem;
        color: #6b6b6b;
        margin-bottom: 22px;
      }

      .btn {
        display: inline-block;
        padding: 14px 22px;
        border-radius: 999px;
        font-weight: 900;
        text-decoration: none;
        background: linear-gradient(135deg, #3fa6a3, #6eced1);
        color: #0b0d10;
        box-shadow: 0 18px 50px rgba(63, 166, 163, 0.35);
        transition: transform 0.18s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Thanks — message sent</h1>
      <p>I’ve received your message and will get back to you shortly.</p>
      <a href="/" class="btn">Back to home</a>
    </div>
  </body>
</html>
