<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Testimonials — KG Glam Designs</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
     <body>
    <a class="skip" href="#main">Skip to content</a>

    <!-- Cursor spotlight -->
    <div class="spotlight" aria-hidden="true"></div>

    <header class="header">
      <nav class="nav shell">
        <a class="brand" href="index.html" aria-label="Back to home">

          <span class="brandMark">KG</span>
          <span class="brandText">Kayla Gagne</span>
        </a>

        <button class="menuBtn" aria-label="Open menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>

        <div class="links" data-links>
          <a href="faq-page.html">FAQ</a>
          <a href="testimonials.html">Testimonials</a>
         
        </div>
      </nav>
    </header>

    <main id="main">
      <section class="hero" id="top">
        <div class="heroLights" aria-hidden="true">
          <div class="orb orbA"></div>
          <div class="orb orbB"></div>
          <div class="orb orbC"></div>
          <div class="scanline"></div>
          <div class="grain"></div>
        </div>

        <div class="shell hero-content">
          <h1 class="hero-title">Testimonials</h1>
          <p class="hero-text">
            Hear from our satisfied customers and discover why they love our
            services.
          </p>
        </div>
      </section>
      
   
      <section class="section">
        <div class="container review-layout">
          <!-- LEFT (FORM) -->
          <div class="review-left">
            <h2>Leave a review</h2>
            <p>Share your experience.</p>
 <div class="rating-summary" id="rating-summary"></div>
            <form class="review-form" data-review-form>
              <div class="review-form__row">
                <label class="review-form__label" for="review-name"
                  >Name (optional)</label
                >
                <input
                  class="review-form__input"
                  id="review-name"
                  name="name"
                  type="text"
                  autocomplete="name"
                />
              </div>


              <div class="review-form__row">
                <p class="review-form__label" id="review-rating-label">
                  Your rating
                </p>

                <fieldset
                  class="rating testimonial-rating"
                  aria-labelledby="review-rating-label"
                >
                  <legend class="visually-hidden">Crown rating</legend>

                  <input
                    class="rating__input"
                    type="radio"
                    name="rating"
                    id="rr5"
                    value="5"
                  />
                  <label
                    class="rating__star"
                    for="rr5"
                    aria-label="5 crowns"
                    title="5 crowns"
                  >
                    <svg
                      class="rating__svg"
                      viewBox="0 0 24 24"
                      aria-hidden="true"
                      focusable="false"
                    >
                      <path
                        d="M5 16l-1-9 5 4 3-6 3 6 5-4-1 9H5zm0 2h14v2H5v-2z"
                      ></path>
                    </svg>
                  </label>

                  <input
                    class="rating__input"
                    type="radio"
                    name="rating"
                    id="rr4"
                    value="4"
                  />
                  <label
                    class="rating__star"
                    for="rr4"
                    aria-label="4 crowns"
                    title="4 crowns"
                  >
                    <svg
                      class="rating__svg"
                      viewBox="0 0 24 24"
                      aria-hidden="true"
                      focusable="false"
                    >
                      <path
                        d="M5 16l-1-9 5 4 3-6 3 6 5-4-1 9H5zm0 2h14v2H5v-2z"
                      ></path>
                    </svg>
                  </label>

                  <input
                    class="rating__input"
                    type="radio"
                    name="rating"
                    id="rr3"
                    value="3"
                  />
                  <label
                    class="rating__star"
                    for="rr3"
                    aria-label="3 crowns"
                    title="3 crowns"
                  >
                    <svg
                      class="rating__svg"
                      viewBox="0 0 24 24"
                      aria-hidden="true"
                      focusable="false"
                    >
                      <path
                        d="M5 16l-1-9 5 4 3-6 3 6 5-4-1 9H5zm0 2h14v2H5v-2z"
                      ></path>
                    </svg>
                  </label>

                  <input
                    class="rating__input"
                    type="radio"
                    name="rating"
                    id="rr2"
                    value="2"
                  />
                  <label
                    class="rating__star"
                    for="rr2"
                    aria-label="2 crowns"
                    title="2 crowns"
                  >
                    <svg
                      class="rating__svg"
                      viewBox="0 0 24 24"
                      aria-hidden="true"
                      focusable="false"
                    >
                      <path
                        d="M5 16l-1-9 5 4 3-6 3 6 5-4-1 9H5zm0 2h14v2H5v-2z"
                      ></path>
                    </svg>
                  </label>

                  <input
                    class="rating__input"
                    type="radio"
                    name="rating"
                    id="rr1"
                    value="1"
                  />
                  <label
                    class="rating__star"
                    for="rr1"
                    aria-label="1 crown"
                    title="1 crown"
                  >
                    <svg
                      class="rating__svg"
                      viewBox="0 0 24 24"
                      aria-hidden="true"
                      focusable="false"
                    >
                      <path
                        d="M5 16l-1-9 5 4 3-6 3 6 5-4-1 9H5zm0 2h14v2H5v-2z"
                      ></path>
                    </svg>
                  </label>

                  <output class="rating__value" aria-live="polite">0</output>
                </fieldset>
              </div>

              

              <p class="small-note" data-review-status aria-live="polite"></p>
               <div class="review-form__row">
                
                <label class="review-form__label" form="review-comment">
                Comment</label>
                <textarea
                  name="comment"
                  required
                  class="review-form__textarea"
                ></textarea>
              </div>

              <div class="review-form__actions">
                <button type="submit" class="btn-primary">Send review</button>
              </div>
            </form>
         

          <!-- RIGHT (TESTIMONIALS) -->
          <div class="review-right">
            <h2>What people are saying</h2>

            <div id="rating-summary"></div>

            <div class="testimonials-list" data-testimonials></div>
          </div>
        </div>
      </section>
      <footer class="footer">
        <div class="shell footRow">
          <p>© <span id="year"></span> KG Glam Designs</p>
          <a class="topLink" href="#top">Back to top ↑</a>
        </div>
      </footer>
    </main>

    <script>
      const form = document.querySelector("[data-review-form]");
      const list = document.querySelector("[data-testimonials]");
      const summary = document.getElementById("rating-summary");

      /* Load saved reviews */
      let reviews = JSON.parse(localStorage.getItem("reviews")) || [];

      /* Create SVG crowns (same look as your form) */
      function createCrowns(rating) {
        let html = "";
        for (let i = 0; i < rating; i++) {
          html += `
      <svg class="crown" viewBox="0 0 24 24">
        <path d="M5 16l-1-9 5 4 3-6 3 6 5-4-1 9H5zm0 2h14v2H5v-2z"></path>
      </svg>
    `;
        }
        return html;
      }

      /* Render testimonials */
      function renderReviews() {
        if (!list) return;

        list.innerHTML = reviews
          .map(
            (r) => `
    <div class="testimonial-card">
      <div class="testimonial-rating">
        ${createCrowns(r.rating)}
      </div>
      <p class="testimonial-text">"${r.comment}"</p>
      <span class="testimonial-name">— ${r.name}</span>
    </div>
  `,
          )
          .join("");

        localStorage.setItem("reviews", JSON.stringify(reviews));
      }

      /* Render average */
      function renderAverage() {
        if (!summary) return;

        if (!reviews.length) {
          summary.innerHTML = "<p>No reviews yet</p>";
          return;
        }

        const total = reviews.reduce((sum, r) => sum + Number(r.rating), 0);
        const avg = (total / reviews.length).toFixed(1);

        summary.innerHTML = `
    <div class="testimonial-rating">
      ${createCrowns(Math.round(avg))}
    </div>
    <p>${avg} / 5 average</p>
  `;
      }

      /* Submit handler */
      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const name = form.name.value || "Anonymous";
        const comment = form.comment.value;
        const rating = form.rating.value;

        if (!rating || !comment) return;

        reviews.push({ name, comment, rating });

        renderReviews();
        renderAverage();

        form.reset();
      });

      /* Load on page */
      renderReviews();
      renderAverage();
    </script>
  </body>
</html>
